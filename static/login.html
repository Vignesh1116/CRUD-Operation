<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusEdu PRO - Login</title>
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">
    <!-- Animated Mesh Gradient Background -->
    <div class="mesh-bg">
        <div class="gradient-sphere sphere-1"></div>
        <div class="gradient-sphere sphere-2"></div>
        <div class="gradient-sphere sphere-3"></div>
    </div>

    <div class="login-container animate-in slide-in-top">
        <div class="login-card glass-effect">
            <div class="login-header">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c3 3 9 3 12 0v-5"></path></svg>
                </div>
                <h2>NexusEdu <span class="badge-sis">PRO</span></h2>
                <p>Welcome back! Please sign in.</p>
            </div>
            
            <div class="auth-tabs">
                <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Login</button>
                <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Register</button>
            </div>
            
            <form id="authForm" class="auth-form">
                <input type="hidden" id="authMode" value="login">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" class="form-control" required placeholder="admin">
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>
                
                <div class="form-actions" style="margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary full-width" id="authSubmitBtn">Sign In</button>
                </div>
                <div id="authError" class="auth-error"></div>
            </form>
        </div>
    </div>
    
    <!-- Notification Toast -->
    <div id="toast" class="toast glass-effect">
        <div class="toast-icon" id="toastIcon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <div class="toast-content" id="toastMessage">Operation successful</div>
    </div>

    <script src="/static/login.js"></script>
</body>
</html>
