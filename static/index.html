<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentCore SIS</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="layout">
        <!-- Header -->
        <header class="top-header">
            <div class="header-container">
                <!-- Brand -->
                <div class="header-brand">
                    <div class="logo-icon">
                        <!-- Graduation Cap Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c3 3 9 3 12 0v-5"></path></svg>
                    </div>
                    <h2>StudentCore <span class="badge-sis">SIS</span></h2>
                </div>
                
                <!-- User Profile & Actions -->
                <div class="user-profile">
                    <button id="themeToggleBtn" class="btn-icon theme-btn" title="Toggle Dark/Light Mode">
                        <svg id="themeIconLight" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                        <svg id="themeIconDark" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    </button>
                    <div class="separator"></div>
                    <div class="avatar-group">
                        <div class="avatar">AD</div>
                        <span class="user-name">Admin User</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content 2-Column Layout -->
        <main class="content-container">
            <!-- Left Column: Form -->
            <aside class="left-panel">
                <div class="card form-card">
                    <div class="form-header">
                        <h3 id="formTitle">Student Registration</h3>
                        <p id="formSubtitle">Add a new student or update an existing record.</p>
                    </div>
                    <form id="studentForm">
                        <input type="hidden" id="formMode" value="add">
                        
                        <div class="form-group">
                            <label for="studentId" class="form-label">Student ID</label>
                            <input type="number" id="studentId" class="form-control" required placeholder="e.g. 101">
                        </div>
                        
                        <div class="form-group">
                            <label for="studentName" class="form-label">Full Name</label>
                            <input type="text" id="studentName" class="form-control" required placeholder="John Doe">
                        </div>
                        
                        <div class="form-group">
                            <label for="studentAge" class="form-label">Age</label>
                            <input type="number" id="studentAge" class="form-control" required placeholder="20" min="10" max="100">
                        </div>
                        
                        <div class="form-group">
                            <label for="studentCourse" class="form-label">Program / Course</label>
                            <input type="text" id="studentCourse" class="form-control" required placeholder="Computer Science">
                        </div>
                        
                        <div class="form-actions">
                            <button type="button" class="btn btn-outline" id="cancelBtn" style="display: none;">Cancel</button>
                            <button type="submit" class="btn btn-primary full-width" id="saveBtn">Save Record</button>
                        </div>
                    </form>
                </div>
            </aside>

            <!-- Right Column: Table -->
            <section class="right-panel">
                <div class="section-header">
                    <div>
                        <h1 class="page-title">Enrolled Directory</h1>
                        <p class="page-description">Manage all active student profiles.</p>
                    </div>
                    <button id="refreshBtn" class="btn btn-outline btn-refresh">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                        Refresh
                    </button>
                </div>

                <div class="card table-wrapper">
                    <div class="table-container">
                        <table class="data-table" id="studentTable">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>STUDENT NAME</th>
                                    <th>COURSE / PROGRAM</th>
                                    <th>AGE</th>
                                    <th class="text-right">ACTIONS</th>
                                </tr>
                            </thead>
                            <tbody id="studentTableBody">
                                <!-- Populated via JS -->
                            </tbody>
                        </table>
                        <div id="emptyState" class="empty-state">
                            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
                            <h3>No students found</h3>
                            <p>Use the registration form to add students.</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast">
        <div class="toast-icon" id="toastIcon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <div class="toast-content" id="toastMessage">Operation successful</div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
